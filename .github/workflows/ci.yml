name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: portal
          POSTGRES_PASSWORD: portal
          POSTGRES_DB: portal_test
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        working-directory: backend
        run: pip install -e '.[dev]'
      - name: Lint
        working-directory: backend
        run: |
          ruff check .
          ruff format --check .
      - name: Type check
        working-directory: backend
        run: mypy app
      - name: Migrate + test
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://portal:portal@localhost:5432/portal_test
          TEST_DATABASE_URL: postgresql+asyncpg://portal:portal@localhost:5432/portal_test
          AUTH_SIGNING_KEY: test-key
          INBOUND_EMAIL_HMAC_SECRET: test-secret
          WEBHOOK_HMAC_SECRET: test-secret
        run: |
          alembic upgrade head
          pytest -v --cov=app --cov-fail-under=80

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Test
        working-directory: frontend
        run: npm test
