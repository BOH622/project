name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options: [staging, prod]
        default: staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    permissions:
      id-token: write
      contents: read
    env:
      ENV: ${{ github.event.inputs.environment || 'staging' }}
      AWS_REGION: us-east-1
      ECR_REPOSITORY: portal-backend
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      # ---- Backend: build + push + ECS deploy ----
      - name: Build backend image
        working-directory: backend
        run: |
          docker build -t $ECR_REPOSITORY:${{ github.sha }} .
          docker tag $ECR_REPOSITORY:${{ github.sha }} ${{ steps.ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}
          docker tag $ECR_REPOSITORY:${{ github.sha }} ${{ steps.ecr.outputs.registry }}/$ECR_REPOSITORY:latest

      - name: Push backend image
        run: |
          docker push ${{ steps.ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}
          docker push ${{ steps.ecr.outputs.registry }}/$ECR_REPOSITORY:latest

      - name: Force ECS service redeploy
        run: |
          aws ecs update-service \
            --cluster ${ENV}-portal \
            --service ${ENV}-portal-backend \
            --force-new-deployment

      # ---- Frontend: build + sync to S3 + CloudFront invalidate ----
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE: ${{ env.ENV == 'prod' && 'https://api.projects.tryusercue.com' || 'https://api.projects-staging.tryusercue.com' }}
        run: |
          npm ci
          npm run build

      - name: Sync frontend to S3
        run: aws s3 sync frontend/dist s3://usercue-portal-frontend-${ENV} --delete

      - name: Invalidate CloudFront
        env:
          DOMAIN: ${{ env.ENV == 'prod' && 'projects.tryusercue.com' || 'projects-staging.tryusercue.com' }}
        run: |
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Aliases.Items[0]=='${DOMAIN}'].Id" \
            --output text)
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
