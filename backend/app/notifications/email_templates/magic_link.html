<!doctype html>
<html>
  <body style="font-family: system-ui, -apple-system, sans-serif; max-width: 560px; margin: 40px auto; color: #0f172a;">
    <h2 style="margin: 0 0 16px;">Sign in to UserCue Projects</h2>
    <p>Click the button to sign in:</p>
    <p style="margin: 24px 0;">
      <a href="{{ link }}"
         style="background: #4f46e5; color: #fff; padding: 10px 20px; border-radius: 6px;
                text-decoration: none; display: inline-block;">
        Sign in
      </a>
    </p>
    <p style="color: #475569; font-size: 14px;">
      This link expires in 15 minutes and can only be used once. If you didn't
      request it, you can ignore this email.
    </p>
    <p style="color: #475569; font-size: 14px;">
      Or copy this URL into your browser:<br>
      <span style="word-break: break-all;">{{ link }}</span>
    </p>
  </body>
</html>
